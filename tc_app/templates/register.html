<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Premium</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(rgba(0, 0, 0, 0.65), rgba(0, 0, 0, 0.75)),
                        url('{% static "images/register.avif" %}') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .register-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 50px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        h2 {
            font-size: 2.2rem;
            margin-bottom: 10px;
            font-weight: 600;
        }

        p.subtitle {
            color: #ddd;
            margin-bottom: 30px;
            font-size: 1.05rem;
        }

        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.95rem;
        }

        .success { background: rgba(46, 204, 113, 0.3); color: #2ecc71; }
        .error   { background: rgba(231, 76, 60, 0.3); color: #e74c3c; }

        input, select {
            width: 100%;
            padding: 14px 16px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }

        input::placeholder, select {
            color: #ccc;
        }

        input:focus, select:focus {
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.2);
        }

        button {
            width: 100%;
            padding: 14px;
            margin: 20px 0 15px;
            background: linear-gradient(135deg, #6e8efb, #a777e3);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(110, 142, 251, 0.4);
        }

        a {
            color: #a777e3;
            text-decoration: none;
            font-size: 0.95rem;
        }

        a:hover {
            text-decoration: underline;
        }

        .form-group {
            text-align: left;
            margin-bottom: 8px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
            color: #ddd;
        }
    </style>
</head>
<body>

    <div class="register-container">
        <h2>Create Account</h2>
        <p class="subtitle">Join us and get started</p>

        {% if messages %}
            {% for message in messages %}
                <div class="message {% if message.tags == 'success' %}success{% else %}error{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <input type="text" name="username" placeholder="Username" required autofocus>

            <input type="password" name="password" placeholder="Password" required>

            <div class="form-group">
                <label for="role">Select Role</label>
                <select name="role" id="role">
                    <option value="user">User</option>
                    <option value="staff">Staff</option>
                    <!-- Admin option hidden for security -->
                </select>
            </div>

            <button type="submit">Register Now</button>
        </form>

        <p>
            Already have an account? 
            <a href="/">Login here</a>
        </p>
    </div>

</body>
</html>
