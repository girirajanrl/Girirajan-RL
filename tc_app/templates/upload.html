<!DOCTYPE html>
{% load static %}   
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Student Data</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-image: url('{% static 'images/uploadtc.jpg' %}');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        
        .glass {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center">

    <div class="max-w-md w-full mx-auto px-6">
        <!-- Card -->
        <div class="glass rounded-3xl shadow-2xl p-10">
            
            <!-- Header -->
            <div class="text-center mb-8">
                <div class="mx-auto w-20 h-20 bg-white/20 rounded-2xl flex items-center justify-center mb-4 backdrop-blur-sm">
                    <span class="text-4xl">📊</span>
                </div>
                <h1 class="text-3xl font-bold text-white tracking-tight">
                    Upload Student Excel
                </h1>
                <p class="text-white/70 mt-2 text-sm">
                    Import student data seamlessly
                </p>
            </div>

            <!-- Form -->
            <form method="POST" enctype="multipart/form-data" class="space-y-6">
                {% csrf_token %}
                
                <!-- File Upload Area -->
                <div class="relative group">
                    <label class="block">
                        <div class="border-2 border-dashed border-white/40 hover:border-white/70 transition-all duration-300 rounded-2xl p-10 text-center cursor-pointer">
                            <div class="mx-auto w-16 h-16 bg-white/10 rounded-2xl flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
                                📁
                            </div>
                            <p class="text-white text-lg font-medium">Drop your Excel file here</p>
                            <p class="text-white/60 text-sm mt-1">or click to browse</p>
                            <input 
                                type="file" 
                                name="file" 
                                accept=".xlsx,.xls"
                                required
                                class="hidden"
                                id="file-input"
                            >
                        </div>
                    </label>
                </div>

                <!-- Submit Button -->
                <button 
                    type="submit"
                    class="w-full bg-white text-gray-900 font-semibold py-4 rounded-2xl hover:bg-white/90 active:scale-95 transition-all duration-200 shadow-lg shadow-white/20 flex items-center justify-center gap-2 text-lg">
                    <span>Upload File</span>
                    <span class="text-xl">→</span>
                </button>
            </form>
            <div class="text-blue pt-7  text-lg font-medium hover-green">
                <a href="{% url 'staff_dashboard' %}" class="nav-link">
                    return staff_dashboard
                </a>
                </div>
            <!-- Footer Note -->
            <p class="text-center text-white/50 text-xs mt-8">
                Supported formats: <span class="font-medium">.xlsx, .xls</span>
            </p>
        </div>
    </div>

    <script>
        // Optional: Make the entire dashed area clickable
        document.querySelector('label').addEventListener('click', function() {
            document.getElementById('file-input').click();
        });
    </script>

</body>
</html>
