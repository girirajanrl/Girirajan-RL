<h2>Pending TC Requests</h2>

<table border="1" cellpadding="10">
    <tr>
        <th>Name</th>
        <th>Admission No</th>
        <th>Action</th>
    </tr>

    {% for student in students %}
    <tr>
        <td>{{ student.name }}</td>
        <td>{{ student.admission_no }}</td>
        <td>
            <a href="/approve/{{ student.id }}/">Approve</a> |
            <a href="/reject/{{ student.id }}/">Reject</a>
        </td>
    </tr>
    {% endfor %}
</table>
