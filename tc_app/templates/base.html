<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TC Admin | Dashboard</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Google Font: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
        }
        
        .sidebar {
            background: #0f172a;
        }
        
        .nav-link {
            transition: all 0.3s ease;
        }
        
        .nav-link:hover {
            transform: translateX(8px);
        }
        
        .nav-link.active {
            background-color: #2563eb;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }
        
        /* Glass effect for cards */
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
    </style>
    
    <script>
        tailwind.config = {
            content: [],
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif']
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-900">

    <!-- SIDEBAR -->
    <div class="sidebar w-72 fixed h-screen border-r border-slate-700 shadow-2xl flex flex-col">
        <!-- Sidebar Header -->
        <div class="px-6 py-8 border-b border-slate-700">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center text-white text-2xl font-bold">
                    TC
                </div>
                <div>
                    <h2 class="text-2xl font-bold text-white tracking-tight">TC Admin</h2>
                    <p class="text-slate-400 text-sm">Administrator Portal</p>
                </div>
            </div>
        </div>

        <!-- Navigation Menu -->
        <nav class="flex-1 px-4 py-6 overflow-y-auto">
            <ul class="space-y-1">
                <li>
                    <a href="{% url 'admin_dashboard' %}" class="nav-link active flex items-center gap-3 px-5 py-3.5 text-slate-300 hover:text-white rounded-2xl text-[15px] font-medium">
                        📊 Dashboard
                    </a>
                </li>
                
                <li>
                    <a href="{% url 'pending' %}" class="nav-link flex items-center gap-3 px-5 py-3.5 text-slate-300 hover:text-white rounded-2xl text-[15px] font-medium">
                        📋 TC Pending
                    </a>
                </li>
                <li>
                    <a href="{% url 'approved' %}" class="nav-link flex items-center gap-3 px-5 py-3.5 text-slate-300 hover:text-white rounded-2xl text-[15px] font-medium">
                        ✅ TC Approved
                    </a>
                </li>
                <li>
                    <a href="{% url 'rejected' %}" class="nav-link flex items-center gap-3 px-5 py-3.5 text-slate-300 hover:text-white rounded-2xl text-[15px] font-medium">
                        📜 TC Rejected
                    </a>
                </li>
                <li>
                    <a href="{% url 'reports' %}" class="nav-link flex items-center gap-3 px-5 py-3.5 text-slate-300 hover:text-white rounded-2xl text-[15px] font-medium">
                        📊 Reports
                    </a>
                </li>
                <li>
                    <a href="{% url 'staff_dashboard' %}" class="nav-link flex items-center gap-3 px-5 py-3.5 text-slate-300 hover:text-white rounded-2xl text-[15px] font-medium">
                        👷 Staff Dashboard
                    </a>
                </li>
            </ul>
        </nav>

        <!-- Logout -->
        <div class="p-4 border-t border-slate-700">
            <a href="{% url 'logout' %}" 
               onclick="return confirm('Are you sure you want to logout?')"
               class="nav-link flex items-center gap-3 px-5 py-3.5 text-red-400 hover:text-red-500 rounded-2xl text-[15px] font-medium">
                🚪 Logout
            </a>
        </div>
    </div>

    <!-- MAIN CONTENT AREA -->
    <div class="ml-72 min-h-screen">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
