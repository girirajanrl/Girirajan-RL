<!DOCTYPE html>
<html>
<head>
    <title>Student List</title>
</head>
<body>

<h2>Student Records</h2>

<!-- 🔍 Search Bar -->
<form method="GET">
    <input type="text" name="q" placeholder="Search by Name / Admission No / Branch">
    <button type="submit">Search</button>
</form>

<br>

<form method="POST" action="/bulk-tc/">
    {% csrf_token %}

    <table border="1" cellpadding="10">
        <tr>
            <th>Select</th>
            <th>Name</th>
            <th>Admission No</th>
            <th>Branch</th>
            <th>Action</th>
        </tr>

        {% for user in total_users %}
        <tr>
            <td>
                <input type="checkbox" name="student_ids" value="{{ student.id }}">
            </td>
            <td>{{ student.name }}</td>
            <td>{{ student.admission_no }}</td>
            <td>{{ student.branch_sem }}</td>
<td>
    {% if student.status == 'approved' %}
        <a href="/generate-tc/{{ student.id }}/">Download TC</a>
    {% else %}
        Not Approved
    {% endif %}
</td>
        </tr>
        {% endfor %}
    </table>

    <br>
    <button type="submit">Download Selected (Bulk)</button>
</form>

</body>
</html>
